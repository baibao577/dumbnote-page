    <!-- Firefox-Android momentum-scroll fix. Gecko's APZ stalls a fling
         whenever a non-passive touchstart/touchmove listener sits on a root
         scroller target (window/document/documentElement/body): it does a
         per-touch main-thread handshake, so the fling freezes ~600ms on
         re-touch and the URL bar oscillates — app-wide, every page. (Chrome's
         APZ tolerates the same listener, which is why it's Firefox-only.)
         SortableJS — bundled via vuedraggable for the Snapshots kanban —
         registers an ALWAYS-ON `document` touchmove with an explicit
         { passive: false } at module-init ("Fixed #973" in sortable.esm.js).
         The single-file build inlines + eagerly executes every module, so that
         listener landed on every page and froze scrolling everywhere.

         This forces touchstart/touchmove on the root targets to passive
         (overriding explicit passive:false) — but ONLY while no pointer is
         down. The discriminator is gesture state, not a one-shot boot window:
         SortableJS's always-on listener registers at module eval (when its
         chunk loads, never mid-gesture) → caught while forcing → passivated →
         freeze gone. Its DURING-DRAG listeners (also `document` touchmove, but
         added synchronously when the user presses a card, i.e. while a pointer
         IS down) are left non-passive, so they can still preventDefault
         page-scroll while dragging → the kanban drag keeps working on touch.

         Why gesture state and not `load`: the Snapshots route (and with it
         vuedraggable/SortableJS) is now lazy-loaded (src/router/index.js), so
         SortableJS evals on the first /snapshots visit — long AFTER `load`. A
         one-shot "stop forcing at load" window would miss it entirely and the
         always-on listener would land non-passive → the freeze returns. Keying
         on pointer-down state catches the listener whenever its chunk loads.

         Must run BEFORE the app bundle / before SortableJS registers, which an
         inline head script guarantees regardless of bundler module ordering.
         Scoped to root targets only, so element-level handlers (e.g. the
         canvas <svg> d3 gestures) are untouched. No-op on Chrome/Safari. -->
    <script>
      (function () {
        var ROOT_TOUCH = { touchstart: 1, touchmove: 1 };
        var forcing = true;
        var _add = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function (type, listener, options) {
          if (
            forcing &&
            ROOT_TOUCH[type] &&
            (this === window || this === document ||
              this === document.documentElement || this === document.body)
          ) {
            if (options === undefined || typeof options === 'boolean') {
              options = { capture: !!options, passive: true };
            } else if (options && typeof options === 'object') {
              options = Object.assign({}, options, { passive: true });
            }
          }
          return _add.call(this, type, listener, options);
        };
        // Force-passivate root-target touch listeners EXCEPT while a pointer
        // is down (a drag in progress). SortableJS's always-on #973 listener
        // registers at module eval — now lazily, on first /snapshots visit,
        // never mid-gesture — so it's caught (forcing=true) and passivated. Its
        // drag-time listeners register synchronously on pointerdown
        // (forcing=false) and stay non-passive so the kanban card drag can
        // still preventDefault page-scroll on touch. Capture phase ensures
        // forcing flips BEFORE SortableJS's own target-phase press handler runs
        // and registers those drag-time listeners. These toggles go through the
        // original addEventListener (so the patch above doesn't recurse on
        // them) and only set a flag, so passive is correct.
        function arm() { forcing = true; }
        function disarm() { forcing = false; }
        var armOpts = { passive: true, capture: true };
        _add.call(window, 'pointerdown', disarm, armOpts);
        _add.call(window, 'touchstart', disarm, armOpts);
        _add.call(window, 'pointerup', arm, armOpts);
        _add.call(window, 'pointercancel', arm, armOpts);
        _add.call(window, 'touchend', arm, armOpts);
        _add.call(window, 'touchcancel', arm, armOpts);
      })();
    </script>

    <!-- SPA-on-GH-Pages decoder. Pairs with /404.html at the
         dumbnote-page repo root: that script bounces
         /mindmap/maps/69 → /mindmap/?/maps/69 (since GitHub Pages
         only honors a root-level 404.html and our SPA uses HTML5
         history mode). This decoder rewrites the URL back via
         history.replaceState BEFORE Vue Router boots, so a
         refreshed deep link ends up on the right route. No-op for
         normal loads. -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

  <body>
    <!-- Instant boot splash: painted from static HTML+CSS before any JS runs,
         so a cold/slow first load shows a spinner instead of a blank white
         page during the entry-chunk download + eval. Vue's app.mount('#app')
         replaces #app's contents on mount, so this is auto-removed — no JS
         teardown needed. The canvas route then shows its own loading overlay
         (App.vue) until the map renders, for a continuous loading state. -->
    <div id="app">
      <div id="app-splash" role="status" aria-label="Loading">
        <div class="app-splash__spinner"></div>
      </div>
    </div>
